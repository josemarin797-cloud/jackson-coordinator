<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f10">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dispatcher">
  <link rel="manifest" href="manifest.json">
<title>Dispatcher — Transporte Emporium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f10;--s1:#1a1a1c;--s2:#232325;--b1:#2e2e31;--b2:#3a3a3e;--tx:#e8e8ea;--tx2:#9898a0;--tx3:#5a5a62;--acc:#e8a020;--acc2:#f0b840;--green:#22c55e;--blue:#3b82f6;--purple:#8b5cf6;--red:#ef4444;--amber:#f59e0b;--r:10px;--rs:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.lcard{background:var(--s1);border:0.5px solid var(--b1);border-radius:16px;padding:36px;width:100%;max-width:360px;}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.llogo-icon{width:38px;height:38px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.llogo-name{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3;}
.llogo-sub{font-size:10px;color:var(--tx2);}
.ltitle{font-size:20px;font-weight:600;margin-bottom:4px;}
.lsub{font-size:12px;color:var(--tx2);margin-bottom:22px;}
.usel{display:flex;gap:6px;margin-bottom:20px;}
.ubtn{flex:1;padding:9px;border-radius:var(--rs);border:0.5px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.ubtn.active{border-color:var(--acc);color:var(--acc);background:#e8a02015;}
.plabel{font-size:11px;color:var(--tx2);margin-bottom:8px;}
.pdots{display:flex;gap:9px;margin-bottom:18px;justify-content:center;}
.pdot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--b2);transition:all .15s;}
.pdot.on{background:var(--acc);border-color:var(--acc);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.nbtn{padding:13px;border-radius:var(--rs);border:0.5px solid var(--b2);background:var(--s2);color:var(--tx);font-size:17px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;text-align:center;}
.nbtn:hover{background:var(--b1);}
.nbtn:active{transform:scale(.95);}
.nbtn.del{font-size:12px;font-family:'Inter',sans-serif;color:var(--tx2);}
.lbtn{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--acc);color:#0f0f10;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;margin-bottom:8px;}
.lbtn:hover{background:var(--acc2);}
.fbtn{width:100%;padding:10px;border-radius:var(--rs);border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;}
.fbtn:hover{border-color:var(--acc);color:var(--acc);}
.lerr{font-size:11px;color:var(--red);text-align:center;margin-top:6px;min-height:16px;}
#app{display:none;min-height:100vh;}
.topbar{background:var(--s1);border-bottom:0.5px solid var(--b1);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tbl{display:flex;align-items:center;gap:10px;}
.tblogo{font-size:12px;font-weight:600;color:var(--acc);}
.tbsep{color:var(--tx3);}
.tbtit{font-size:12px;color:var(--tx2);}
.tbr{display:flex;align-items:center;gap:8px;}
.tbclock{font-family:'Inter',sans-serif;font-size:11px;color:var(--tx3);}
.tbuser{font-size:11px;color:var(--tx2);background:var(--s2);border:0.5px solid var(--b1);padding:4px 9px;border-radius:18px;}
.tbout{padding:5px 10px;border-radius:var(--rs);border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.tbout:hover{border-color:var(--red);color:var(--red);}
.tabs{display:flex;gap:2px;padding:10px 18px 0;border-bottom:0.5px solid var(--b1);background:var(--s1);}
.tbtn{padding:7px 14px;border-radius:var(--rs) var(--rs) 0 0;border:0.5px solid transparent;background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;border-bottom:none;}
.tbtn.active{background:var(--bg);border-color:var(--b1);border-bottom-color:var(--bg);color:var(--tx);margin-bottom:-0.5px;}
.mc{padding:18px;max-width:1080px;margin:0 auto;}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.scard{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:12px 14px;}
.slabel{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.sval{font-size:22px;font-weight:600;font-family:'Inter',sans-serif;}
.oh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.otit{font-size:13px;font-weight:600;}
.bnew{padding:7px 14px;border-radius:var(--rs);border:none;background:var(--acc);color:#0f0f10;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.bnew:hover{background:var(--acc2);}
.filters{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.fbtn2{padding:4px 11px;border-radius:18px;border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.fbtn2.active{background:var(--acc);border-color:var(--acc);color:#0f0f10;}
.olist{display:flex;flex-direction:column;gap:7px;}
.ocard{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);overflow:hidden;border-left:3px solid var(--b2);}
.ocard.p{border-left-color:var(--amber);}
.ocard.r{border-left-color:var(--blue);}
.ocard.t{border-left-color:var(--purple);}
.ocard.e{border-left-color:var(--green);}
.omain{padding:11px 13px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.oinfo{flex:1;min-width:0;}
.otop{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap;}
.otype{font-size:9px;padding:2px 6px;border-radius:3px;background:var(--s2);color:var(--tx2);}
.otitle{font-size:13px;font-weight:500;color:var(--tx);}
.ometa{font-size:11px;color:var(--tx2);margin-bottom:2px;}
.ofooter{font-size:10px;color:var(--tx3);}
.oacts{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sbadge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap;}
.sbadge.p{background:#f59e0b15;color:var(--amber);}
.sbadge.r{background:#3b82f615;color:var(--blue);}
.sbadge.t{background:#8b5cf615;color:var(--purple);}
.sbadge.e{background:#22c55e15;color:var(--green);}
.bdel{padding:3px 7px;border-radius:3px;border:0.5px solid var(--b2);background:transparent;color:var(--tx3);font-size:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.bdel:hover{border-color:var(--red);color:var(--red);}
.empty{text-align:center;padding:50px 20px;color:var(--tx3);font-size:13px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal{background:var(--s1);border:0.5px solid var(--b1);border-radius:13px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.mhead{padding:16px 18px;border-bottom:0.5px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--s1);z-index:1;}
.mtit{font-size:14px;font-weight:600;}
.mclose{width:26px;height:26px;border-radius:5px;border:none;background:var(--s2);color:var(--tx2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.mbody{padding:18px;display:flex;flex-direction:column;gap:13px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:var(--tx2);}
.fi,.fsel,.fta{padding:8px 11px;border-radius:var(--rs);border:0.5px solid var(--b2);background:var(--s2);color:var(--tx);font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acc);}
.fsel option{background:var(--s2);}
.fta{resize:vertical;min-height:65px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dlist{display:flex;flex-direction:column;gap:5px;}
.ditem{display:flex;align-items:center;gap:7px;background:var(--s2);border-radius:var(--rs);padding:7px 9px;}
.ditem span{flex:1;font-size:12px;}
.dreml{width:18px;height:18px;border-radius:3px;border:none;background:var(--b1);color:var(--tx2);cursor:pointer;font-size:11px;}
.badd{padding:6px 11px;border-radius:var(--rs);border:0.5px dashed var(--b2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;width:100%;}
.badd:hover{border-color:var(--acc);color:var(--acc);}
.dest-block{background:var(--s2);border:0.5px solid var(--b2);border-radius:var(--rs);overflow:hidden;margin-bottom:6px;}
.dest-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:0.5px solid var(--b1);}
.dest-name{font-size:12px;font-weight:500;color:var(--tx);}
.dest-deptos{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;}
.depto-pill{padding:3px 9px;border-radius:12px;border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.depto-pill.on{background:var(--acc);border-color:var(--acc);color:#0f0f10;font-weight:500;}
.dest-custom{padding:0 10px 8px;display:flex;gap:5px;}
.dest-custom input{flex:1;padding:5px 8px;border-radius:var(--rs);border:0.5px solid var(--b2);background:var(--s1);color:var(--tx);font-size:11px;font-family:'Inter',sans-serif;outline:none;}
.dest-custom input:focus{border-color:var(--acc);}
.dest-custom button{padding:5px 9px;border-radius:var(--rs);border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;}
.dest-custom button:hover{border-color:var(--acc);color:var(--acc);}
.ocard-dests{margin-top:4px;display:flex;flex-direction:column;gap:2px;}
.mfoot{padding:13px 18px;border-top:0.5px solid var(--b1);display:flex;gap:8px;justify-content:flex-end;}
.bcanc{padding:8px 16px;border-radius:var(--rs);border:0.5px solid var(--b2);background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.bsave{padding:8px 18px;border-radius:var(--rs);border:none;background:var(--acc);color:#0f0f10;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.bsave:hover{background:var(--acc2);}
.rtable{width:100%;border-collapse:collapse;font-size:12px;}
.rtable th{text-align:left;padding:9px 12px;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--b1);}
.rtable td{padding:10px 12px;border-bottom:0.5px solid var(--b1);color:var(--tx);}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr:hover td{background:var(--s2);}
.dsec{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:14px;margin-top:18px;}
.dtit{font-size:11px;color:var(--red);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px;}
.bdanger{padding:7px 14px;border-radius:var(--rs);border:0.5px solid var(--red);background:transparent;color:var(--red);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.bdanger:hover{background:#ef444415;}
.tcontent{display:none;}
.tcontent.active{display:block;}
@media(max-width:600px){.sbar{grid-template-columns:repeat(2,1fr);}.frow{grid-template-columns:1fr;}.tbclock{display:none;}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="llogo">
      <div class="llogo-icon">&#x1F69A;</div>
      <div>
        <div class="llogo-name">Transporte Emporium</div>
        <div class="llogo-sub">Sistema de Despacho</div>
      </div>
    </div>
    <div class="ltitle">Acceso</div>
    <div class="lsub">Selecciona usuario e ingresa tu PIN</div>
    <div class="usel">
      <button class="ubtn active" onclick="selUser('jose')" id="bu-jose">Jose Marin</button>
      <button class="ubtn" onclick="selUser('jackson')" id="bu-jackson">Jackson H.</button>
    </div>
    <div class="plabel">PIN de acceso</div>
    <div class="pdots" id="pdots">
      <div class="pdot" id="d0"></div><div class="pdot" id="d1"></div>
      <div class="pdot" id="d2"></div><div class="pdot" id="d3"></div>
    </div>
    <div class="numpad">
      <button class="nbtn" onclick="ap('1')">1</button>
      <button class="nbtn" onclick="ap('2')">2</button>
      <button class="nbtn" onclick="ap('3')">3</button>
      <button class="nbtn" onclick="ap('4')">4</button>
      <button class="nbtn" onclick="ap('5')">5</button>
      <button class="nbtn" onclick="ap('6')">6</button>
      <button class="nbtn" onclick="ap('7')">7</button>
      <button class="nbtn" onclick="ap('8')">8</button>
      <button class="nbtn" onclick="ap('9')">9</button>
      <button class="nbtn del" onclick="cpn()">Borrar</button>
      <button class="nbtn" onclick="ap('0')">0</button>
      <button class="nbtn del" onclick="dp()">&#x232B;</button>
    </div>
    <button class="lbtn" onclick="doLogin()">Entrar</button>
    <button class="fbtn" onclick="doFp()">&#x261D; Entrar con huella</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tbl">
      <span class="tblogo">Emporium</span>
      <span class="tbsep">/</span>
      <span class="tbtit">Dispatcher</span>
    </div>
    <div class="tbr">
      <span class="tbclock" id="clk"></span>
      <span class="tbuser" id="tbuser"></span>
      <button class="tbout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tbtn active" onclick="swTab('ordenes')">Ordenes del dia</button>
    <button class="tbtn" onclick="swTab('resumen')">Resumen</button>
    <button class="tbtn" onclick="swTab('config')">Configuracion</button>
  </div>
  <div class="mc">

    <div id="t-ordenes" class="tcontent active">
      <div class="sbar">
        <div class="scard"><div class="slabel">Pendientes</div><div class="sval" id="s-p" style="color:var(--amber)">0</div></div>
        <div class="scard"><div class="slabel">En transito</div><div class="sval" id="s-t" style="color:var(--purple)">0</div></div>
        <div class="scard"><div class="slabel">Entregadas</div><div class="sval" id="s-e" style="color:var(--green)">0</div></div>
        <div class="scard"><div class="slabel">Total del dia</div><div class="sval" id="s-tot" style="color:var(--tx)">0</div></div>
      </div>
      <div class="oh">
        <div class="otit">Ordenes</div>
        <button class="bnew" onclick="openModal()">+ Nueva orden</button>
      </div>
      <div class="filters">
        <button class="fbtn2 active" onclick="setF('todas')">Todas</button>
        <button class="fbtn2" onclick="setF('Pendiente')">Pendiente</button>
        <button class="fbtn2" onclick="setF('Recogida')">Recogida</button>
        <button class="fbtn2" onclick="setF('En transito')">En transito</button>
        <button class="fbtn2" onclick="setF('Entregada')">Entregada</button>
      </div>
      <div class="olist" id="olist"><div class="empty">No hay ordenes hoy. Crea la primera.</div></div>
      <div class="dsec">
        <div class="dtit">Zona de borrado</div>
        <button class="bdanger" onclick="delAll()">Borrar todas las ordenes del dia</button>
      </div>
    </div>

    <div id="t-resumen" class="tcontent">
      <div id="resumen-content"><div class="empty">No hay ordenes hoy.</div></div>
    </div>

    <div id="t-config" class="tcontent">
      <div style="max-width:400px;">
        <div style="font-size:14px;font-weight:600;margin-bottom:16px;">Cambiar PIN</div>
        <div style="background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:12px;">
          <div class="fg">
            <label class="fl">PIN actual</label>
            <input class="fi" type="password" maxlength="4" id="pin-actual" placeholder="****" />
          </div>
          <div class="fg">
            <label class="fl">PIN nuevo</label>
            <input class="fi" type="password" maxlength="4" id="pin-nuevo" placeholder="****" />
          </div>
          <div class="fg">
            <label class="fl">Confirmar PIN nuevo</label>
            <input class="fi" type="password" maxlength="4" id="pin-confirm" placeholder="****" />
          </div>
          <button class="bsave" onclick="changePin()" style="width:100%;padding:10px;">Guardar nuevo PIN</button>
          <div id="pin-msg" style="font-size:11px;text-align:center;min-height:16px;"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="mhead">
      <div class="mtit">Nueva orden de despacho</div>
      <button class="mclose" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="mbody">
      <div class="fg">
        <label class="fl">Tipo de orden</label>
        <select class="fsel" id="f-type">
          <option value="Transferencia">Transferencia</option>
          <option value="Proveedor">Proveedor</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl">Origen</label>
          <select class="fsel" id="f-origin">
            <option value="">Seleccionar sucursal...</option>
            <option>CDE</option>
            <option>Suc. Casarapa</option>
            <option>Suc. Palma Real</option>
            <option>Suc. Miranda</option>
            <option>Suc. La Parada</option>
            <option>Suc. Guatire</option>
            <option>Suc. Castillejo</option>
            <option>Caracas</option>
            <option>Araira</option>
            <option>Guatire (zona)</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Departamentos que envían</label>
        <div id="dept-pills" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;"></div>
        <div style="display:flex;gap:5px;">
          <input class="fi" id="f-dept-custom" placeholder="Otro departamento..." style="flex:1" onkeydown="if(event.key==='Enter')addDeptCustom()" />
          <button class="badd" style="width:auto;padding:6px 10px;" onclick="addDeptCustom()">+</button>
        </div>
        <input type="hidden" id="f-dept" />
      </div>
      <div class="fg">
        <label class="fl">Destinos y departamentos</label>
        <div id="dlist"></div>
        <div style="display:flex;gap:7px;margin-top:6px;">
          <select class="fsel" id="di" style="flex:1">
            <option value="">Seleccionar sucursal...</option>
            <option>CDE</option>
            <option>Suc. Casarapa</option>
            <option>Suc. Palma Real</option>
            <option>Suc. Miranda</option>
            <option>Suc. La Parada</option>
            <option>Suc. Guatire</option>
            <option>Suc. Castillejo</option>
            <option>Caracas</option>
            <option>Araira</option>
            <option>Guatire (zona)</option>
          </select>
          <button class="badd" style="width:auto;padding:6px 14px;" onclick="addDest()">+ Agregar</button>
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="fl">Chofer</label>
          <select class="fsel" id="f-driver">
            <option value="">Seleccionar...</option>
            <option>Daniel Subero</option>
            <option>Jackson Hernandez</option>
            <option>Willmer Fernandez</option>
            <option>Richard Hernandez</option>
            <option>Darwin Serrano</option>
            <option>Jose Marin</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">Vehiculo</label>
          <select class="fsel" id="f-vehicle">
            <option value="">Seleccionar...</option>
            <option>NPR 01</option>
            <option>NPR 02</option>
            <option>FUSO 03</option>
            <option>NPR 04</option>
            <option>L300 05</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Notas</label>
        <textarea class="fta" id="f-notes" placeholder="4 reses, temperatura controlada, material fragil..."></textarea>
      </div>

      <button class="bsave" onclick="saveOrder()">Asignar orden</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://sieadibkcqnvbwlwlmds.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpZWFkaWJrY3FudmJ3bHdsbWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDAwMDgsImV4cCI6MjA5NDE3NjAwOH0.ce9c28wht4rR7YtBdh0BFVMhTv-9CfbsuZDNPX6lBZY';

const DEF_PINS={jose:'0000',jackson:'1111'};
function getPin(u){return localStorage.getItem('disp:pin_'+u)||DEF_PINS[u];}
function setPin(u,p){localStorage.setItem('disp:pin_'+u,p);}

const USERS={
  jose:{name:'Jose Marin',display:'Jose Marin',lastName:'Marín'},
  jackson:{name:'Jackson Hernandez',display:'Jackson H.',lastName:'Hernández'}
};

let cu=null,pin='',su='jose',orders=[],dests=[],filt='todas',poll=null;

async function sbf(path,opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    ...opts,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',
    'Prefer':opts.method==='POST'?'return=representation':'',...(opts.headers||{})}
  });
  if(!r.ok)return null;
  const t=await r.text();return t?JSON.parse(t):null;
}

function selUser(u){
  su=u;
  document.getElementById('bu-jose').classList.toggle('active',u==='jose');
  document.getElementById('bu-jackson').classList.toggle('active',u==='jackson');
  cpn();
}

function ap(d){if(pin.length>=4)return;pin+=d;upd();if(pin.length===4)setTimeout(doLogin,200);}
function dp(){pin=pin.slice(0,-1);upd();}
function cpn(){pin='';upd();}
function upd(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('on',i<pin.length);}

function speak(msg){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(msg);
  u.lang='es-US';u.rate=1.0;u.pitch=1.0;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang==='es-US')||vs.find(x=>x.lang.startsWith('es'))||vs[0];
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

function greeting(){
  const h=new Date().getHours();
  if(h<12)return'Buenos dias';
  if(h<19)return'Buenas tardes';
  return'Buenas noches';
}

async function doLogin(){
  if(pin===getPin(su)){
    cu={...USERS[su],key:su};
    localStorage.setItem('disp:sess',JSON.stringify(cu));
    await showApp();
  }else{
    document.getElementById('lerr').textContent='PIN incorrecto';
    cpn();setTimeout(()=>document.getElementById('lerr').textContent='',2000);
  }
}

async function doFp(){
  try{
    const stored=localStorage.getItem('disp:fp_'+su);
    if(!stored){
      await navigator.credentials.create({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rp:{name:'Dispatcher Emporium'},
        user:{id:new TextEncoder().encode(su),name:su,displayName:USERS[su].name},
        pubKeyCredParams:[{type:'public-key',alg:-7}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
        timeout:30000
      }});
      localStorage.setItem('disp:fp_'+su,'1');
    }else{
      await navigator.credentials.get({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        userVerification:'required',timeout:30000
      }});
    }
    cu={...USERS[su],key:su};
    localStorage.setItem('disp:sess',JSON.stringify(cu));
    await showApp();
  }catch(e){
    document.getElementById('lerr').textContent='Huella no disponible';
    setTimeout(()=>document.getElementById('lerr').textContent='',3000);
  }
}

async function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tbuser').textContent=cu.display;
  startClock();
  await loadOrders();
  poll=setInterval(loadOrders,10000);
  // Saludo de voz con estado de ordenes
  setTimeout(()=>{
    const pend=orders.filter(o=>o.status==='Pendiente').length;
    const trans=orders.filter(o=>o.status==='En transito').length;
    let msg=`${greeting()} Senior ${cu.lastName.normalize('NFC')}. Bienvenido al sistema de despacho.`;
    if(pend>0||trans>0){
      msg+=` Tiene ${pend} orden${pend!==1?'es':''} pendiente${pend!==1?'s':''} y ${trans} en transito.`;
    }else{
      msg+=' No hay ordenes pendientes. Que tenga una excelente jornada.';
    }
    speak(msg);
  },600);
}

function doLogout(){
  if(!confirm('Cerrar sesion?'))return;
  localStorage.removeItem('disp:sess');
  cu=null;clearInterval(poll);
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  cpn();
}

function startClock(){
  const el=document.getElementById('clk');
  const u=()=>el.textContent=new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  u();setInterval(u,1000);
}

async function loadOrders(){
  const today=new Date().toISOString().slice(0,10);
  const data=await sbf(`orders?date=eq.${today}&order=created_at.desc`);
  if(data){orders=data;renderOrders();renderStats();renderResumen();}
}

function renderStats(){
  const t=orders;
  document.getElementById('s-p').textContent=t.filter(o=>o.status==='Pendiente').length;
  document.getElementById('s-t').textContent=t.filter(o=>o.status==='En transito').length;
  document.getElementById('s-e').textContent=t.filter(o=>o.status==='Entregada').length;
  document.getElementById('s-tot').textContent=t.length;
}

function renderOrders(){
  let list=orders;
  if(filt!=='todas')list=list.filter(o=>o.status===filt);
  const el=document.getElementById('olist');
  if(!list.length){el.innerHTML=`<div class="empty">No hay ordenes${filt!=='todas'?' con este filtro':' hoy'}.</div>`;return;}
  const sk={Pendiente:'p',Recogida:'r','En transito':'t',Entregada:'e'};
  el.innerHTML=list.map(o=>{
    const k=sk[o.status]||'p';
    // Soporta tanto el formato nuevo {sucursal,deptos} como el viejo string
    let destsHtml='';
    if(Array.isArray(o.destinations)){
      if(o.destinations.length>0 && typeof o.destinations[0]==='object'){
        destsHtml=`<div class="ocard-dests">${o.destinations.map(d=>`
          <div style="font-size:11px;color:var(--tx2)">
            <span style="color:var(--tx);font-weight:500">📍 ${d.sucursal}</span>
            ${d.deptos&&d.deptos.length>0?`<span style="color:var(--acc);margin-left:5px">${d.deptos.join(' · ')}</span>`:''}
          </div>`).join('')}</div>`;
      }else{
        destsHtml=`<div class="ometa">${o.destinations.join(', ')}</div>`;
      }
    }
    const t=o.created_at?new Date(o.created_at).toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}):'';
    return`<div class="ocard ${k}">
      <div class="omain">
        <div class="oinfo">
          <div class="otop"><span class="otype">${o.type||'Transferencia'}</span><span class="otitle">${o.department||''}</span></div>
          <div class="ometa">${o.origin||''} <span style="color:var(--acc);font-size:10px">[${o.department||''}]</span> &rarr;</div>
          ${destsHtml}
          <div class="ometa" style="margin-top:3px">${o.driver_id||''} &middot; ${o.vehicle_id||''}</div>
          ${o.notes?`<div class="ofooter">${o.notes}</div>`:''}
          <div class="ofooter" style="margin-top:3px">Montada por ${o.created_by||''} &middot; ${t}</div>
        </div>
        <div class="oacts">
          <span class="sbadge ${k}">${o.status}</span>
          <button class="bdel" onclick="delOrder('${o.id}')">Borrar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderResumen(){
  if(!orders.length){document.getElementById('resumen-content').innerHTML='<div class="empty">No hay ordenes hoy.</div>';return;}
  const byD={};
  orders.forEach(o=>{
    const d=o.driver_id||'Sin asignar';
    if(!byD[d])byD[d]={orders:[],vehicles:new Set()};
    byD[d].orders.push(o);
    if(o.vehicle_id)byD[d].vehicles.add(o.vehicle_id);
  });
  const rows=Object.entries(byD).map(([d,data])=>{
    const tot=data.orders.length;
    const ent=data.orders.filter(o=>o.status==='Entregada').length;
    const pen=tot-ent;
    const veh=[...data.vehicles].join(', ');
    return`<tr><td>${d}</td><td>${veh}</td><td style="text-align:center">${tot}</td><td style="text-align:center;color:var(--green)">${ent}</td><td style="text-align:center;color:var(--amber)">${pen}</td></tr>`;
  }).join('');
  const byC={};
  orders.forEach(o=>{const c=o.created_by||'?';byC[c]=(byC[c]||0)+1;});
  const cr=Object.entries(byC).map(([c,n])=>`<span style="font-size:12px;color:var(--tx2)">${c}: <strong style="color:var(--tx)">${n}</strong></span>`).join(' &nbsp;&middot;&nbsp; ');
  const byT={};
  orders.forEach(o=>{const t=o.type||'Transferencia';byT[t]=(byT[t]||0)+1;});
  const tr2=Object.entries(byT).map(([t,n])=>`<div style="background:var(--s2);border-radius:6px;padding:8px 12px;text-align:center;"><div style="font-size:18px;font-weight:600;color:var(--acc);font-family:monospace;">${n}</div><div style="font-size:10px;color:var(--tx2);margin-top:2px;">${t}</div></div>`).join('');
  document.getElementById('resumen-content').innerHTML=`
    <div style="font-size:13px;font-weight:600;margin-bottom:14px;">Resumen &mdash; ${new Date().toLocaleDateString('es-VE',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div style="background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:12px;">
      <table class="rtable"><thead><tr><th>Chofer</th><th>Vehiculo</th><th style="text-align:center">Total</th><th style="text-align:center">Entregadas</th><th style="text-align:center">Pendientes</th></tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div style="background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;margin-bottom:12px;">
      <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px;">Montadas por coordinador</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">${cr}</div>
    </div>
    <div style="background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;">
      <div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px;">Por tipo de orden</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${tr2}</div>
    </div>`;
}

function setF(f){
  filt=f;
  document.querySelectorAll('.fbtn2').forEach(b=>b.classList.toggle('active',
    (f==='todas'&&b.textContent==='Todas')||(f!=='todas'&&b.textContent===f)));
  renderOrders();
}

function swTab(t){
  ['ordenes','resumen','config'].forEach((x,i)=>{
    document.getElementById('t-'+x).classList.toggle('active',x===t);
    document.querySelectorAll('.tbtn')[i].classList.toggle('active',x===t);
  });
  if(t==='resumen')renderResumen();
}

const DEPTOS_TRANSFER=['Charcutería','Carnicería','Desposte','Fruver','Víveres','Licores','Varios'];
const DEPTOS_TRASLADO=['Mercadeo','Servicios Generales','Proveedores','Activos','Otro'];

let tmpD=[];
let originDeptos=[];

function renderOriginDeptos(){
  const tipo=document.getElementById('f-type')?document.getElementById('f-type').value:'Transferencia';
  const deptosList=tipo==='Transferencia'?DEPTOS_TRANSFER:DEPTOS_TRASLADO;
  document.getElementById('dept-pills').innerHTML=deptosList.map(dep=>
    `<button class="depto-pill${originDeptos.includes(dep)?' on':''}" onclick="toggleOriginDepto('${dep}')">${dep}</button>`
  ).join('');
  document.getElementById('f-dept').value=originDeptos.join(', ');
}

function toggleOriginDepto(dep){
  const i=originDeptos.indexOf(dep);
  if(i>=0)originDeptos.splice(i,1);else originDeptos.push(dep);
  renderOriginDeptos();
}

function addDeptCustom(){
  const inp=document.getElementById('f-dept-custom');
  const val=inp.value.trim();
  if(!val)return;
  if(!originDeptos.includes(val))originDeptos.push(val);
  inp.value='';
  renderOriginDeptos();
}

function openModal(){
  tmpD=[];
  originDeptos=[];
  ['f-type','f-origin','f-driver','f-vehicle','f-notes'].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&el.tagName==='SELECT')el.value='';else if(el)el.value='';
  });
  document.getElementById('f-type').value='Transferencia';
  document.getElementById('f-dept').value='';
  document.getElementById('f-dept-custom').value='';
  document.getElementById('di').value='';
  renderOriginDeptos();
  renderDests();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function addDest(){
  const v=document.getElementById('di').value;
  if(!v)return;
  if(tmpD.find(d=>d.sucursal===v)){alert('Ese destino ya fue agregado');return;}
  tmpD.push({sucursal:v,deptos:[]});
  document.getElementById('di').value='';
  renderDests();
}

function remDest(i){tmpD.splice(i,1);renderDests();}

function toggleDepto(destIdx,depto){
  const d=tmpD[destIdx];
  const i=d.deptos.indexOf(depto);
  if(i>=0)d.deptos.splice(i,1);else d.deptos.push(depto);
  renderDests();
}

function addCustomDepto(destIdx){
  const inp=document.getElementById('cdep-'+destIdx);
  const val=inp.value.trim();
  if(!val)return;
  if(!tmpD[destIdx].deptos.includes(val))tmpD[destIdx].deptos.push(val);
  inp.value='';
  renderDests();
}

function renderDests(){
  const tipo=document.getElementById('f-type')?document.getElementById('f-type').value:'Transferencia';
  const deptosList=tipo==='Transferencia'?DEPTOS_TRANSFER:DEPTOS_TRASLADO;
  document.getElementById('dlist').innerHTML=tmpD.map((d,i)=>`
    <div class="dest-block">
      <div class="dest-head">
        <span class="dest-name">📍 ${d.sucursal}</span>
        <button onclick="remDest(${i})" style="padding:2px 8px;border-radius:3px;border:none;background:var(--b1);color:var(--tx2);cursor:pointer;font-size:10px;">✕ Quitar</button>
      </div>
      <div class="dest-deptos">
        ${deptosList.map(dep=>`<button class="depto-pill${d.deptos.includes(dep)?' on':''}" onclick="toggleDepto(${i},'${dep}')">${dep}</button>`).join('')}
      </div>
      <div class="dest-custom">
        <input id="cdep-${i}" placeholder="Otro depto..." onkeydown="if(event.key==='Enter')addCustomDepto(${i})" />
        <button onclick="addCustomDepto(${i})">+</button>
      </div>
      ${d.deptos.length>0?`<div style="padding:0 10px 8px;font-size:10px;color:var(--acc)">✓ ${d.deptos.join(' · ')}</div>`:'<div style="padding:0 10px 8px;font-size:10px;color:var(--tx3)">Selecciona al menos un departamento</div>'}
    </div>`).join('');
}

async function sendPushToDriver(driverName, orderType, dept, origin, destinations){
  try {
    const msg = orderType + ' - ' + dept + ': ' + origin + ' → ' + destinations.join(', ');
    await fetch('https://sieadibkcqnvbwlwlmds.supabase.co/functions/v1/send-push', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpZWFkaWJrY3FudmJ3bHdsbWRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDAwMDgsImV4cCI6MjA5NDE3NjAwOH0.Qdh2soPMFgJVBY45HHUqatBhkECOlFBBJIBkFJA5Lak'
      },
      body: JSON.stringify({
        app_id: '4b7c6ad7-ef30-44eb-8847-c42f1529a48f', driverName: driverName, message: msg,
        
      })
    });
  } catch(e) {}
}

async function saveOrder(){
  const origin=document.getElementById('f-origin').value.trim();
  const driver=document.getElementById('f-driver').value;
  const vehicle=document.getElementById('f-vehicle').value;
  if(!origin||!driver||!vehicle||!tmpD.length){alert('Completa todos los campos y agrega al menos un destino');return;}
  if(originDeptos.length===0){alert('Selecciona al menos un departamento que envía');return;}
  const sinDeptos=tmpD.filter(d=>d.deptos.length===0);
  if(sinDeptos.length>0){alert('Agrega al menos un departamento a: '+sinDeptos.map(d=>d.sucursal).join(', '));return;}
  const destNames=tmpD.map(d=>d.sucursal);
  const dept=originDeptos.join(', ');
  const o={type:document.getElementById('f-type').value,department:dept,requested_by:dept,origin,
    destinations:tmpD,driver_id:driver,vehicle_id:vehicle,
    notes:document.getElementById('f-notes').value.trim(),
    status:'Pendiente',created_by:cu.display,date:new Date().toISOString().slice(0,10)};
  const r=await sbf('orders',{method:'POST',body:JSON.stringify(o)});
  if(r){
    closeModal();
    loadOrders();
    sendPushToDriver(driver,o.type,dept,origin,destNames);
  }else alert('Error al guardar la orden');
}

async function delOrder(id){if(!confirm('Borrar esta orden?'))return;await sbf(`orders?id=eq.${id}`,{method:'DELETE'});loadOrders();}
async function delAll(){
  if(!confirm('Borrar TODAS las ordenes de hoy?'))return;
  await sbf(`orders?date=eq.${new Date().toISOString().slice(0,10)}`,{method:'DELETE'});
  loadOrders();
}

function changePin(){
  const act=document.getElementById('pin-actual').value;
  const nvo=document.getElementById('pin-nuevo').value;
  const cnf=document.getElementById('pin-confirm').value;
  const msg=document.getElementById('pin-msg');
  if(act!==getPin(cu.key)){msg.style.color='var(--red)';msg.textContent='PIN actual incorrecto';return;}
  if(nvo.length!==4||isNaN(nvo)){msg.style.color='var(--red)';msg.textContent='El PIN debe tener 4 digitos';return;}
  if(nvo!==cnf){msg.style.color='var(--red)';msg.textContent='Los PINs no coinciden';return;}
  setPin(cu.key,nvo);
  msg.style.color='var(--green)';msg.textContent='PIN actualizado correctamente';
  document.getElementById('pin-actual').value='';
  document.getElementById('pin-nuevo').value='';
  document.getElementById('pin-confirm').value='';
  setTimeout(()=>msg.textContent='',3000);
}

async function autoCleanOldOrders(){
  const today = new Date().toISOString().slice(0,10);
  const lastDate = localStorage.getItem('disp:lastCleanDate');
  if(lastDate && lastDate !== today){
    // Es un nuevo dia - borrar ordenes entregadas del dia anterior
    try {
      await sbf('orders?status=eq.Entregada&date=eq.' + lastDate, {method:'DELETE'});
    } catch(e) {}
  }
  localStorage.setItem('disp:lastCleanDate', today);
}

if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(sw=>sw.unregister()));navigator.serviceWorker.register('/sw.js').catch(()=>{});}

window.addEventListener('load',async()=>{
  const s=localStorage.getItem('disp:sess');
  if(s){try{cu=JSON.parse(s);await showApp();await autoCleanOldOrders();}catch(e){localStorage.removeItem('disp:sess');}}
});
</script>
